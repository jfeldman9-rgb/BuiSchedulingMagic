<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheduler Intake v3.3</title>
  <style>
    :root {
      --bg-main: #f4f6f8; --bg-surface: #ffffff; --border: #e0e4e8;
      --text-main: #1a1f24; --text-muted: #637381;
      --primary: #0052cc; --danger: #de350b;
      --badge-yellow: #fffae6; --badge-green: #e3fcef;
    }
    body.dark-mode {
      --bg-main: #0d1117; --bg-surface: #161b22; --border: #30363d;
      --text-main: #c9d1d9; --text-muted: #8b949e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
    body { display: flex; height: 100vh; background: var(--bg-main); color: var(--text-main); }
    .hidden { display: none !important; }
    .sidebar { width: 260px; background: var(--bg-surface); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .nav-links { list-style: none; display: grid; gap: 4px; flex-grow: 1; }
    .nav-links a { text-decoration: none; color: var(--text-muted); padding: 10px; border-radius: 8px; font-weight: 600; display: block; }
    .nav-links a.active { background: var(--bg-main); color: var(--primary); }
    .content { flex: 1; overflow-y: auto; padding: 25px; }
    .btn { padding: 9px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-main); cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
    .btn.primary { background: var(--primary); color: #fff; border: none; }
    .table-container { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 10px; overflow: auto; margin-top: 15px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; font-size: 0.9rem; }
    th { background: var(--bg-main); color: var(--text-muted); text-transform: uppercase; font-size: 0.75rem; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal-content { background: var(--bg-surface); width: min(96vw, 900px); max-height: 90vh; overflow-y: auto; border-radius: 12px; padding: 20px; }
    #loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
    .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <nav class="sidebar">
    <h2 style="color:var(--primary)">v3.3 Free</h2>
    <ul class="nav-links">
      <li><a href="#" data-nav="view-master" class="active">Master Requests</a></li>
      <li><a href="#" data-nav="view-calendar">Calendar</a></li>
      <li><a href="#" data-nav="view-export">Settings</a></li>
    </ul>
    <div style="display:grid; gap:8px;">
      <input type="file" id="file-upload" class="hidden" multiple accept="image/*">
      <button class="btn primary" id="btn-upload-images">📷 Upload Screenshots</button>
      <button class="btn" id="btn-toggle-dark">🌙 Dark Mode</button>
    </div>
  </nav>

  <main class="content">
    <div id="loading-overlay" class="hidden"><div class="spinner"></div><h3 style="margin-top:10px;">Free Tier Processing...</h3></div>

    <section id="view-master" class="view">
      <h2>Master Requests</h2>
      <div class="table-container"><table id="master-table"><thead><tr><th>Provider</th><th>Start</th><th>End</th><th>Type</th><th>Notes</th><th>Action</th></tr></thead><tbody></tbody></table></div>
    </section>

    <section id="view-calendar" class="view hidden">
      <h2 id="cal-month-label">Month</h2>
      <div id="calendar-grid"></div>
    </section>

    <section id="view-export" class="view hidden">
      <h2>Settings</h2>
      <button class="btn outline" id="btn-set-api" style="margin-top:20px;">Set Gemini API Key</button>
      <button class="btn danger outline" id="btn-reset-data">Wipe Data</button>
    </section>
  </main>

  <div id="import-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Review Import</h3>
      <div class="table-container"><table id="import-preview-table"><thead><tr><th>Provider</th><th>Start</th><th>End</th><th>Type</th><th>Notes</th></tr></thead><tbody></tbody></table></div>
      <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:15px;">
        <button class="btn" id="btn-cancel-import">Cancel</button>
        <button class="btn primary" id="btn-confirm-import">Import</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'scheduler_v3_3';
    const API_KEY_KEY = 'gemini_api_key';
    // PRODUCTION STABLE NAMES FOR FREE TIER
    const GEMINI_MODELS = ['gemini-1.5-flash', 'gemini-1.5-pro', 'gemini-pro-vision'];

    let appData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { providers: [{id:'prov_abui', name:'Alex Bui'}, {id:'prov_jfeldman', name:'Jason Feldman'}], requests: [] };
    let stagedImports = [];

    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); renderTable(); }
    function escapeHtml(str) { return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    function renderTable() {
      const tbody = document.querySelector('#master-table tbody');
      tbody.innerHTML = appData.requests.map(r => `<tr><td>${escapeHtml(r.provider_id)}</td><td>${r.start_date}</td><td>${r.end_date}</td><td>${r.request_type}</td><td>${escapeHtml(r.notes)}</td><td><button class="btn sm" onclick="deleteReq('${r.id}')">Del</button></td></tr>`).join('');
    }

    async function callGemini(apiKey, parts) {
      let lastErr = "";
      for (const model of GEMINI_MODELS) {
        try {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/${model}:generateContent?key=${apiKey}`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: [{ parts }] })
          });
          const data = await res.json();
          if (res.ok && data.candidates) return data.candidates[0].content.parts[0].text;
          lastErr = data.error ? data.error.message : `Status ${res.status}`;
        } catch (e) { lastErr = e.message; }
      }
      throw new Error(`Model Error: ${lastErr}`);
    }

    document.getElementById('btn-upload-images').addEventListener('click', () => document.getElementById('file-upload').click());
    document.getElementById('file-upload').addEventListener('change', async (e) => {
      const files = Array.from(e.target.files);
      const apiKey = localStorage.getItem(API_KEY_KEY);
      if(!apiKey) return alert("Set API Key in Settings.");
      
      document.getElementById('loading-overlay').classList.remove('hidden');
      try {
        const prompt = `Return ONLY JSON array. Current date is ${new Date().toDateString()}. Roster: ${JSON.stringify(appData.providers)}. Schema: [{"provider_id":"", "request_type":"off_request|wants_shift", "start_date":"YYYY-MM-DD", "end_date":"YYYY-MM-DD", "notes":""}]`;
        const parts = [{ text: prompt }];
        for (const f of files) {
          const base64 = await new Promise(r => { const reader = new FileReader(); reader.onload = () => r(reader.result.split(',')[1]); reader.readAsDataURL(f); });
          parts.push({ inline_data: { mime_type: "image/jpeg", data: base64 } });
        }
        const text = await callGemini(apiKey, parts);
        stagedImports = JSON.parse(text.replace(/```json/g, '').replace(/```/g, ''));
        const tbody = document.querySelector('#import-preview-table tbody');
        tbody.innerHTML = stagedImports.map(r => `<tr><td>${escapeHtml(r.provider_id)}</td><td>${r.start_date}</td><td>${r.end_date}</td><td>${r.request_type}</td><td>${escapeHtml(r.notes)}</td></tr>`).join('');
        document.getElementById('import-modal').classList.remove('hidden');
      } catch (err) { alert(err.message); }
      finally { document.getElementById('loading-overlay').classList.add('hidden'); e.target.value = ''; }
    });

    document.getElementById('btn-confirm-import').addEventListener('click', () => {
      stagedImports.forEach(r => { r.id = 'req_'+Math.random(); appData.requests.push(r); });
      saveData(); document.getElementById('import-modal').classList.add('hidden');
    });

    window.deleteReq = (id) => { appData.requests = appData.requests.filter(r=>r.id!==id); saveData(); };
    document.querySelectorAll('[data-nav]').forEach(a => a.addEventListener('click', e => {
      document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
      document.getElementById(e.target.dataset.nav).classList.remove('hidden');
    }));
    document.getElementById('btn-set-api').addEventListener('click', () => { const k = prompt("API Key:"); if(k) localStorage.setItem(API_KEY_KEY, k.trim()); });
    document.getElementById('btn-toggle-dark').addEventListener('click', () => document.body.classList.toggle('dark-mode'));
    document.getElementById('btn-cancel-import').addEventListener('click', () => document.getElementById('import-modal').classList.add('hidden'));

    renderTable();
  </script>
</body>
</html>
